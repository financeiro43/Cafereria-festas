<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Festa Pass - Eventos Inteligentes</title>
    <script>
      // Force update mechanism for PWA/Mobile
      (function() {
        const CURRENT_VERSION = '1.2.1'; // Incremented to trigger update
        const storedVersion = localStorage.getItem('app_version');
        
        if (storedVersion && storedVersion !== CURRENT_VERSION) {
          console.log('New version detected, clearing cache and reloading...');
          localStorage.setItem('app_version', CURRENT_VERSION);
          
          // Clear service workers if any
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              for (let registration of registrations) {
                registration.unregister();
              }
            });
          }
          
          // Clear standard caches
          if ('caches' in window) {
            caches.keys().then((names) => {
              for (const name of names) caches.delete(name);
            });
          }
          
          // Force a hard reload from server
          window.location.reload(true);
        } else {
          localStorage.setItem('app_version', CURRENT_VERSION);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
